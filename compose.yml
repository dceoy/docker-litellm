services:
  litellm:
    build:
      context: .
      dockerfile: Dockerfile
    image: litellm:latest
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    env_file:
      - .env
    volumes:
      - ./config.yml:/app/config.yml
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c
          "import urllib.request;
          urllib.request.urlopen('http://localhost:4000/health/liveliness')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
